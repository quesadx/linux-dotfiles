[main]
font=IBM Plex Mono:size=13
prompt="> "
width=45%
lines=12
icon-size=0
terminal=foot
layer=overlay
exit-on-keyboard-focus-loss=yes
dpi-aware=no
show-actions=no
action-overlay-filter-mode=text
match-mode=contains
sort-mode=frecency

[colors]
background=#1a1530dd
text=#e0dcffff
border=#866ec7ff
match=#8f71ffff
selection-match=#b7fbffff
selection=#866ec7cc
selection-text=#e0dcffff

[border]
width=3
radius=5

[dmenu]
mode=text
