[main]
font=IBM Plex Mono:size=13
prompt="run: "
width=45%
lines=12
icon-size=0
terminal=foot
layer=overlay
exit-on-keyboard-focus-loss=yes
dpi-aware=no
show-actions=no
action-overlay-filter-mode=text
match-mode=contains
sort-mode=frecency

[colors]
background=#2a1a22ff
text=#ffe3c4ff
border=#ff8f00ff
match=#ffb85aff
selection-match=#ffd178ff
selection=#c94c1dcc
selection-text=#fff1deff

[border]
width=3
radius=5

[dmenu]
mode=text
