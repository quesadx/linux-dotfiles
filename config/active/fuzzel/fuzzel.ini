[main]
font=IBM Plex Mono:size=13
prompt="run: "
width=45%
lines=12
icon-size=0
terminal=foot
layer=overlay
exit-on-keyboard-focus-loss=yes
dpi-aware=no
show-actions=no
action-overlay-filter-mode=text
match-mode=fzf
sort-mode=alphabetical

[colors]
background=#000000ff
text=#aaaaaaff
border=#00aa00ff
match=#55ff55ff
selection-match=#000000ff
selection=#55ff55cc
selection-text=#000000ff

[border]
width=1
radius=0

[dmenu]
mode=text
